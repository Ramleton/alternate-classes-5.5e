name: Gemini AI README Updater

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., 1.6.0)'
        required: true
        default: '1.6.0'
      release_body:
        description: 'Release Notes / Changes'
        required: true
        default: '- Added full automation support for the Alternate Bard class features and its core subclasses.\n- Integrated Bardic Inspiration mechanics into the macro engine.'

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate New README via Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          MODULE_JSON=$(cat module.json 2>/dev/null || echo "No module.json file found.")
          CURRENT_README=$(cat README.md 2>/dev/null || echo "No README.md found.")

          VERSION_TAG="v${{ github.event.inputs.version_tag }}"
          RELEASE_NOTES="${{ github.event.inputs.release_body }}"
          CURRENT_DATE=$(date +"%B %Y")

          # 1. Build the exact same structured prompt
          PROMPT="You are an expert technical documentation assistant updating the README.md for a Foundry VTT module called 'Alternate Classes 5.5e'.

          Here is the existing README.md:
          '''
          $CURRENT_README
          '''

          Here is the new module.json configuration:
          '''
          $MODULE_JSON
          '''

          Recent Changes / Release Notes (READ THIS CAREFULLY TO IDENTIFY WORK DONE):
          '''
          $RELEASE_NOTES
          '''

          TASK:
          Update the provided README.md strictly using these rules:
          1. Carefully read the 'Recent Changes / Release Notes' above. Identify which alternate classes were explicitly worked on, automated, or implemented in this release.
          2. Locate the 'Supported Classes & Automation Status' table in the README. If your analysis of the Release Notes shows a class listed there has now been completed or automated, update that specific class's row status from '❌ Upcoming' to '🔄 Implemented'. Do not modify rows for classes not mentioned in the notes.
          3. Locate the '## Changelog' header. Insert a new subsection directly below it for the new release, formatted exactly like this:
             ### Version $VERSION_TAG ($CURRENT_DATE)
             [Summarize or paste the core bullet points from the Release Notes here]
             Keep the previous version history below it intact.
          4. Go to the very bottom footer and update the variables exactly to:
             **Current Module Version:** $VERSION_TAG  
             **Latest Release Date:** $CURRENT_DATE

          CRITICAL RULES:
          - Do not alter or delete the Installation steps, Requirements list, Technology Stack, Project Structure, or Credits sections. Keep them exactly as they are written.
          - Output ONLY the full, updated raw markdown content. 
          - Do not include any chat commentary, introduction, or wrap the final output in backticks."

          # 2. Escape the prompt string cleanly for a JSON payload
          JSON_PAYLOAD=$(node -e "echo(JSON.stringify({contents: [{parts: [{text: process.env.PROMPT}]}]}))" env:PROMPT="$PROMPT" 2>/dev/null || jq -n --arg msg "$PROMPT" '{contents: [{parts: [{text: $msg}]}]}')

          # 3. Hit Google's API endpoint instantly
          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            | jq -r '.candidates[0].content.parts[0].text' > README.md

          echo "Gemini has finished processing the new README file layout."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "docs: AI rewrite of README.md for v${{ github.event.inputs.version_tag }} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No semantic layout modifications detected. Skipping commit."
          fi
