name: Gemini AI README Updater

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., 1.2.4)'
        required: true
      release_body:
        description: 'Changelog / Release Notes summary text'
        required: true

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Environment variables defined here are accessible by ALL steps in this job
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VERSION_INPUT: ${{ github.event.release.tag_name || github.event.inputs.version_tag }}
      RELEASE_INPUT: ${{ github.event.release.body || github.event.inputs.release_body }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate New README via Gemini API
        run: |
          # Export system context to environment
          export MODULE_JSON=$(cat module.json 2>/dev/null || echo "No module.json file found.")
          export VERSION_TAG="v$VERSION_INPUT"
          export CURRENT_DATE=$(date +"%B %Y")

          # 1. Carve out the table and changelog into a template using perl
          perl -0777 -pe 's/\| Class .*?\n\n/{{TABLE_CONTENT}}\n\n/s' README.md > template.md
          perl -0777 -pe 's/## Changelog\s+.*?(?=\n\n##|$)/## Changelog\n\n{{CHANGELOG_CONTENT}}\n\n/s' template.md > template_final.md

          export README_TEMPLATE=$(cat template_final.md)

          node -e '
          async function run() {
            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              console.error("Error: GEMINI_API_KEY secret is missing or empty.");
              process.exit(1);
            }

            const prompt = `You are an expert technical documentation template engine. 
            Fill in the placeholders and update the targeted sections in the README template below.
            
            TEMPLATE:
            """
            ${process.env.README_TEMPLATE}
            """

            DATA:
            Module JSON: ${process.env.MODULE_JSON}
            Release Notes: ${process.env.RELEASE_INPUT}
            Version: ${process.env.VERSION_TAG}
            Date: ${process.env.CURRENT_DATE}

            TASK:
            1. Replace {{TABLE_CONTENT}} with the full Markdown table:
               | Class | Automation Status |
               | :--- | :---: |
               [Update classes mentioned in Release Notes to ✅ Implemented. Keep the rest exactly as they were.]
            2. Replace {{CHANGELOG_CONTENT}} with:
               ### Version ${process.env.VERSION_TAG} (${process.env.CURRENT_DATE})
               [Insert Bullet Points from Release Notes]
               [Keep existing previous changelog entries below this]
            3. Update the footer variables at the very bottom exactly to:
               **Current Module Version:** ${process.env.VERSION_TAG}
               **Latest Release Date:** ${process.env.CURRENT_DATE}
            4. Locate any GitHub download links pointing to the module manifest file in the installation instructions and update the version tag in the URL to exactly: ${process.env.VERSION_TAG}.
            5. Locate the "Requirements" section. CRITICAL LIVE RESEARCH TASK: Use Google Search to look up the latest stable, official release versions of the modules listed in "relationships.requires" and "relationships.recommends" that are fully compatible with the Foundry VTT core version listed in the Module JSON. Update the requirements markdown layout with those exact live version numbers.
            
            CRITICAL RULES:
            - Do not alter or delete the Technology Stack, Project Structure, or Credits sections.
            - Output ONLY the final rendered README content. 
            - Do not include any chat commentary, introductions, or wrap the final output in backticks (no \`\`\`markdown).`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const payload = {
              contents: [{ parts: [{ text: prompt }] }],
              tools: [{ googleSearch: {} }]
            };
            
            const maxRetries = 3;
            let textOutput = null;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                const response = await fetch(url, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload)
                });
                
                const data = await response.json();

                if (response.status === 429) {
                  if (attempt === maxRetries) {
                    console.error("API Error: Exceeded maximum rate limit retries.", JSON.stringify(data));
                    process.exit(1);
                  }
                  
                  const errorMsg = data?.error?.message || "";
                  const retryMatch = errorMsg.match(/retry in (\d+(\.\d+)?)s/);
                  const waitMs = retryMatch ? parseFloat(retryMatch[1]) * 1000 : Math.pow(2, attempt) * 15000;
                  
                  console.warn(`Rate limit hit (429). Sleeping for ${waitMs / 1000}s before retry attempt ${attempt}/${maxRetries}...`);
                  await new Promise(res => setTimeout(res, waitMs));
                  continue;
                }

                if (!response.ok) {
                  console.error(`API Request Failure (Status ${response.status}):`, JSON.stringify(data));
                  process.exit(1);
                }

                textOutput = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                break; 
                
              } catch (err) {
                if (attempt === maxRetries) {
                  console.error("Network framework connection execution failure:", err);
                  process.exit(1);
                }
                console.warn(`Network glitch encountered. Retrying in 10s...`);
                await new Promise(res => setTimeout(res, 10000));
              }
            }
            
            if (!textOutput) {
              console.error("API Response Error: Missing text payload structure.");
              process.exit(1);
            }
            
            require("fs").writeFileSync("README.md", textOutput.trim());
            console.log("README.md updated successfully via Node.js fetch engine.");
          }
          run();
          '

      - name: Validate README Formatting
        run: |
          # Check for key markers that should exist in a valid README
          if ! grep -q "| Class " README.md; then
            echo "Error: The table is missing or corrupted!"
            exit 1
          fi
          if ! grep -q "## Changelog" README.md; then
            echo "Error: The Changelog header is missing!"
            exit 1
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "docs: AI rewrite of README.md for v${{ env.VERSION_INPUT }} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No semantic layout modifications detected. Skipping commit."
          fi
