name: Gemini AI README Updater

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (leave blank to use latest release)'
        required: false
        default: ''
      release_body:
        description: 'Changelog text (leave blank to use latest release)'
        required: false
        default: ''

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve Version and Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version_tag }}"
          RELEASE_TEXT="${{ github.event.release.body || github.event.inputs.release_body }}"

          # If triggered manually with blank inputs, fetch the latest release from GitHub
          if [ -z "$VERSION" ]; then
            echo "No inputs provided. Fetching latest release details..."
            VERSION=$(gh release view --json tagName -q .tagName)
            RELEASE_TEXT=$(gh release view --json body -q .body)
          fi

          echo "VERSION_INPUT=$VERSION" >> $GITHUB_ENV
          {
            echo "RELEASE_INPUT<<EOF"
            echo "$RELEASE_TEXT"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Generate New README via Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx .github/scripts/updateREADME.ts

      - name: Validate README Formatting
        run: |
          if ! grep -q "| Class " README.md; then
            echo "Error: The table is missing or corrupted!"
            exit 1
          fi
          if ! grep -q "## Changelog" README.md; then
            echo "Error: The Changelog header is missing!"
            exit 1
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          RAW_VER="${{ env.VERSION_INPUT }}"
          CLEAN_VER="${RAW_VER#v}"

          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "docs: AI rewrite of README.md for v${CLEAN_VER} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No semantic layout modifications detected. Skipping commit."
          fi
