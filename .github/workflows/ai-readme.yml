name: Gemini AI README Updater

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., 1.2.4)'
        required: true
      release_body:
        description: 'Changelog / Release Notes summary text'
        required: true

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Environment variables defined here are accessible by ALL steps in this job
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VERSION_INPUT: ${{ github.event.release.tag_name || github.event.inputs.version_tag }}
      RELEASE_INPUT: ${{ github.event.release.body || github.event.inputs.release_body }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate New README via Gemini API
        run: |
          # 1. We don't delete anything, we pass the current file content to Node
          export CURRENT_README=$(cat README.md)

          node -e '
          const fs = require("fs");
          const readme = fs.readFileSync("README.md", "utf8");
          const releaseNotes = process.env.RELEASE_INPUT;
          const version = process.env.VERSION_INPUT;
          const date = new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" });

          async function run() {
            const prompt = `
            You are a technical documentation assistant. You are responsible for updating the README.md file provided below.
            
            CURRENT README CONTENT:
            ${readme}

            RELEASE NOTES:
            ${releaseNotes}

            TASKS:
            1. Update the "Supported Classes & Automation Status" table. Based on the Release Notes, find the classes mentioned and update their status to "✅ Implemented". Keep all other rows EXACTLY as they are.
            2. Add a new entry to the "Changelog" section at the top of the list for version ${version} (${date}) with the bullet points from the Release Notes. Do not delete older changelog entries.
            3. Update the footer: **Current Module Version:** v${version} and **Latest Release Date:** ${date}.
            4. Update the manifest URL in the Installation section to use the version: v${version}.
            5. In the "Requirements" section, keep the requirements as they are.
            
            STRICT RULES:
            - Output the COMPLETE README file from start to finish.
            - DO NOT truncate the file.
            - DO NOT remove sections like Technology Stack, Project Structure, or Credits.
            - If you are unsure about a section, leave it exactly as it was.
            - Output ONLY the final markdown content. No conversational text.
            `;

            // ... (keep your existing fetch/retry/write logic here) ...
            // Just ensure you use:
            fs.writeFileSync("README.md", textOutput.trim());
          }
          run();
          '

          echo "--- FINAL README.MD CONTENT ---"
          cat README.md
          echo "--- END FINAL README.MD CONTENT ---"

      - name: Validate README Formatting
        run: |
          # Check for key markers that should exist in a valid README
          if ! grep -q "| Class " README.md; then
            echo "Error: The table is missing or corrupted!"
            exit 1
          fi
          if ! grep -q "## Changelog" README.md; then
            echo "Error: The Changelog header is missing!"
            exit 1
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "docs: AI rewrite of README.md for v${{ env.VERSION_INPUT }} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No semantic layout modifications detected. Skipping commit."
          fi
