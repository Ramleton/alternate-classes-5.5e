name: Gemini AI README Updater

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., 1.2.4)'
        required: true
      release_body:
        description: 'Changelog / Release Notes summary text'
        required: true

jobs:
  build-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Environment variables defined here are accessible by ALL steps in this job
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VERSION_INPUT: ${{ github.event.release.tag_name || github.event.inputs.version_tag }}
      RELEASE_INPUT: ${{ github.event.release.body || github.event.inputs.release_body }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate New README via Gemini API
        run: |
          node -e '
          const fs = require("fs");
          const readme = fs.readFileSync("README.md", "utf8");
          const apiKey = process.env.GEMINI_API_KEY;

          async function run() {
            const prompt = `You are a technical documentation assistant. Update the README.md file provided below.
            
            CURRENT README CONTENT:
            ${readme}

            RELEASE NOTES:
            ${process.env.RELEASE_INPUT}

            TASKS:
            1. Update the "Supported Classes & Automation Status" table. Based on the Release Notes, update mentioned classes to "✅ Implemented". Keep all other rows EXACTLY as they are.
            2. Add a new entry to the "Changelog" section at the top of the list for version ${process.env.VERSION_INPUT} (${new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" })}) with the bullet points from the Release Notes.
            3. Update the footer: **Current Module Version:** v${process.env.VERSION_INPUT} and **Latest Release Date:** ${new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" })}.
            4. Update the manifest URL in the Installation section to use the version: v${process.env.VERSION_INPUT}.
            
            STRICT RULES:
            - Output the COMPLETE README file from start to finish.
            - DO NOT truncate the file.
            - DO NOT remove sections like Technology Stack, Project Structure, or Credits.
            - Output ONLY the final markdown content. No conversational text.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const data = await response.json();
            const textOutput = data?.candidates?.[0]?.content?.parts?.[0]?.text;

            if (!textOutput) {
              console.error("Failed to generate content");
              process.exit(1);
            }

            fs.writeFileSync("README.md", textOutput.trim());
            console.log("README.md updated successfully.");
          }
          run();
          '

      - name: Validate README Formatting
        run: |
          # Check for key markers that should exist in a valid README
          if ! grep -q "| Class " README.md; then
            echo "Error: The table is missing or corrupted!"
            exit 1
          fi
          if ! grep -q "## Changelog" README.md; then
            echo "Error: The Changelog header is missing!"
            exit 1
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "docs: AI rewrite of README.md for v${{ env.VERSION_INPUT }} [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          else
            echo "No semantic layout modifications detected. Skipping commit."
          fi
