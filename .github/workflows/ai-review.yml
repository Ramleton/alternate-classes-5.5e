name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Check pnpm config
        run: pnpm config list

      - name: Install dependencies
        run: pnpm install

      - name: Run AI code review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: pnpm tsx .github/scripts/aiCodeReviewer.ts

      - name: Post review to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewFile = 'review_summary.md';

            if (!fs.existsSync(reviewFile)) {
              console.log('No review file generated.');
              return;
            }

            const review = fs.readFileSync(reviewFile, 'utf-8');

            // Find existing review comment to update it (avoid spam)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.data.find(comment =>
              comment.body.includes('AI Code Review Summary')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: review,
              });
              console.log('Updated existing review comment.');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: review,
              });
              console.log('Created new review comment.');
            }

      - name: Import GPG key
        if: always()
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit pending issues
        if: always()
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f pending_code_issues.md ]; then
            # Save the file before switching branches
            cp pending_code_issues.md /tmp/pending_code_issues.md
            git fetch origin ${{ github.base_ref }}
            git checkout ${{ github.base_ref }}
            # Restore the file onto the base branch
            cp /tmp/pending_code_issues.md pending_code_issues.md
            git add pending_code_issues.md
            git commit -m "chore: update pending code issues" || echo "No changes to commit"
            git push origin ${{ github.base_ref }}
          fi
